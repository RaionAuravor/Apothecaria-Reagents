<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Apothecaria — Registro de Reactivos</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cinzel:wght@400;600&family=IM+Fell+English:ital@0;1&display=swap');

  :root {
    --parchment: #f4ead5;
    --parchment-dark: #e8d9b8;
    --ink: #2c1f0e;
    --ink-light: #5a3e28;
    --forest: #2d5016;
    --loch: #0d3d5e;
    --mountain: #4a3728;
    --dungeon: #3a1a4a;
    --bog: #3d4a1a;
    --isles: #1a3a4a;
    --strange: #4a1a3a;
    --village: #5e3d0d;
    --gold: #b8860b;
    --gold-light: #d4a017;
    --poison-red: #8b1a1a;
    --sweet-blue: #1a5a8b;
    --star: #c9a84c;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background-color: #1a1208;
    background-image: 
      radial-gradient(ellipse at 20% 20%, rgba(184,134,11,0.08) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 80%, rgba(184,134,11,0.05) 0%, transparent 50%);
    min-height: 100vh;
    font-family: 'IM Fell English', serif;
    color: var(--ink);
    padding: 20px;
  }

  /* HEADER */
  .header {
    text-align: center;
    margin-bottom: 30px;
    padding: 30px 20px;
    background: var(--parchment);
    border: 3px solid var(--gold);
    border-radius: 4px;
    box-shadow: 0 0 40px rgba(184,134,11,0.3), inset 0 0 60px rgba(184,134,11,0.05);
    position: relative;
    overflow: hidden;
  }
  .header::before {
    content: '⚗';
    position: absolute;
    font-size: 200px;
    opacity: 0.03;
    top: -40px;
    left: 50%;
    transform: translateX(-50%);
    color: var(--gold);
  }
  .header h1 {
    font-family: 'Cinzel Decorative', cursive;
    font-size: clamp(1.4rem, 4vw, 2.2rem);
    color: var(--ink);
    letter-spacing: 2px;
    text-shadow: 1px 1px 0 var(--gold-light);
    position: relative;
  }
  .header p {
    font-style: italic;
    color: var(--ink-light);
    margin-top: 8px;
    font-size: 1rem;
  }

  /* ORNAMENT */
  .ornament {
    text-align: center;
    color: var(--gold);
    font-size: 1.2rem;
    margin: 8px 0;
    letter-spacing: 8px;
  }

  /* SEARCH & FILTERS */
  .controls {
    background: var(--parchment);
    border: 2px solid var(--gold);
    border-radius: 4px;
    padding: 16px 20px;
    margin-bottom: 20px;
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    align-items: center;
    box-shadow: 0 4px 20px rgba(0,0,0,0.4);
  }
  .controls label {
    font-family: 'Cinzel', serif;
    font-size: 0.75rem;
    color: var(--ink-light);
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .search-box {
    flex: 1;
    min-width: 200px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .search-box input {
    background: var(--parchment-dark);
    border: 1px solid var(--gold);
    border-radius: 3px;
    padding: 8px 12px;
    font-family: 'IM Fell English', serif;
    font-size: 0.95rem;
    color: var(--ink);
    outline: none;
    transition: border-color 0.2s;
  }
  .search-box input:focus { border-color: var(--gold-light); }

  .filter-group {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .filter-group select {
    background: var(--parchment-dark);
    border: 1px solid var(--gold);
    border-radius: 3px;
    padding: 8px 12px;
    font-family: 'IM Fell English', serif;
    font-size: 0.9rem;
    color: var(--ink);
    outline: none;
    cursor: pointer;
  }

  .filter-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .tag-filter {
    background: var(--parchment-dark);
    border: 1px solid var(--gold);
    border-radius: 3px;
    padding: 5px 10px;
    font-family: 'Cinzel', serif;
    font-size: 0.65rem;
    color: var(--ink-light);
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .tag-filter.active {
    background: var(--gold);
    color: var(--ink);
    border-color: var(--gold-light);
  }
  .tag-filter:hover { background: var(--parchment); }

  /* STATS BAR */
  .stats-bar {
    background: var(--parchment);
    border: 1px solid var(--gold);
    border-radius: 4px;
    padding: 10px 20px;
    margin-bottom: 16px;
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
    font-family: 'Cinzel', serif;
    font-size: 0.75rem;
    color: var(--ink-light);
    letter-spacing: 0.5px;
  }
  .stat-item span { color: var(--ink); font-weight: 600; }

  /* REAGENT GRID */
  .reagent-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 12px;
  }

  /* REAGENT CARD */
  .reagent-card {
    background: var(--parchment);
    border: 2px solid var(--gold);
    border-radius: 4px;
    overflow: hidden;
    box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    transition: transform 0.15s, box-shadow 0.15s;
    position: relative;
  }
  .reagent-card:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 25px rgba(0,0,0,0.4);
  }
  .reagent-card.owned { border-color: #5a8b1a; }
  .reagent-card.owned .card-header { background: rgba(90,139,26,0.15); }

  /* CARD HEADER = CLICKABLE TOGGLE */
  .card-header {
    padding: 12px 14px;
    cursor: pointer;
    display: flex;
    align-items: flex-start;
    gap: 10px;
    background: rgba(184,134,11,0.05);
    user-select: none;
  }
  .card-header:hover { background: rgba(184,134,11,0.12); }

  .owned-checkbox {
    width: 22px;
    height: 22px;
    min-width: 22px;
    border: 2px solid var(--gold);
    border-radius: 3px;
    background: var(--parchment-dark);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    margin-top: 2px;
    transition: all 0.2s;
    color: var(--forest);
  }
  .reagent-card.owned .owned-checkbox {
    background: #5a8b1a;
    border-color: #5a8b1a;
    color: white;
  }

  .card-main {
    flex: 1;
    min-width: 0;
  }

  .reagent-name {
    font-family: 'Cinzel', serif;
    font-size: 0.95rem;
    color: var(--ink);
    font-weight: 600;
    line-height: 1.3;
  }

  .card-meta {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    margin-top: 5px;
    align-items: center;
  }

  .type-badge {
    font-family: 'Cinzel', serif;
    font-size: 0.6rem;
    font-weight: 600;
    padding: 2px 7px;
    border-radius: 2px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .type-PLANT { background: #d4edbc; color: #2d5016; border: 1px solid #2d5016; }
  .type-ANIMAL { background: #edddbc; color: #5e3d0d; border: 1px solid #5e3d0d; }
  .type-MAGIC { background: #ddbced; color: #4a1a4a; border: 1px solid #4a1a4a; }

  .stars {
    color: var(--star);
    font-size: 0.85rem;
    letter-spacing: -1px;
  }

  .expand-icon {
    font-size: 0.7rem;
    color: var(--gold);
    margin-left: auto;
    transition: transform 0.2s;
    align-self: center;
    min-width: 16px;
    text-align: center;
  }
  .reagent-card.expanded .expand-icon { transform: rotate(90deg); }

  /* CARD BODY = COLLAPSIBLE */
  .card-body {
    display: none;
    padding: 0 14px 14px;
    border-top: 1px solid rgba(184,134,11,0.3);
  }
  .reagent-card.expanded .card-body { display: block; }

  .card-description {
    font-style: italic;
    font-size: 0.85rem;
    color: var(--ink-light);
    margin: 10px 0;
    line-height: 1.5;
  }

  /* LOCALE TABLE */
  .locale-table {
    width: 100%;
    border-collapse: collapse;
    margin: 8px 0;
    font-size: 0.82rem;
  }
  .locale-table th {
    font-family: 'Cinzel', serif;
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--ink-light);
    padding: 4px 6px;
    text-align: left;
    border-bottom: 1px solid rgba(184,134,11,0.4);
  }
  .locale-table td {
    padding: 4px 6px;
    border-bottom: 1px solid rgba(184,134,11,0.15);
    vertical-align: middle;
  }
  .locale-badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 2px;
    font-family: 'Cinzel', serif;
    font-size: 0.62rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.3px;
  }
  .loc-Forest { background: rgba(45,80,22,0.15); color: var(--forest); border: 1px solid var(--forest); }
  .loc-Loch { background: rgba(13,61,94,0.15); color: var(--loch); border: 1px solid var(--loch); }
  .loc-Mountain { background: rgba(74,55,40,0.15); color: var(--mountain); border: 1px solid var(--mountain); }
  .loc-Dungeon { background: rgba(58,26,74,0.15); color: var(--dungeon); border: 1px solid var(--dungeon); }
  .loc-Bog { background: rgba(61,74,26,0.15); color: var(--bog); border: 1px solid var(--bog); }
  .loc-Isles { background: rgba(26,58,74,0.15); color: var(--isles); border: 1px solid var(--isles); }
  .loc-Strange { background: rgba(74,26,58,0.15); color: var(--strange); border: 1px solid var(--strange); }
  .loc-Village { background: rgba(94,61,13,0.15); color: var(--village); border: 1px solid var(--village); }

  .difficulty-bar {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .diff-pips {
    display: flex;
    gap: 2px;
  }
  .pip {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--parchment-dark);
    border: 1px solid var(--gold);
  }
  .pip.filled { background: var(--gold); }
  .diff-num {
    font-family: 'Cinzel', serif;
    font-size: 0.7rem;
    color: var(--ink-light);
  }

  .season-mod {
    font-size: 0.75rem;
    color: var(--ink-light);
    font-style: italic;
    margin-top: 4px;
  }
  .season-mod span { color: var(--ink); font-style: normal; }

  /* USES / TAGS */
  .uses-section { margin-top: 8px; }
  .uses-title {
    font-family: 'Cinzel', serif;
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--ink-light);
    margin-bottom: 4px;
  }
  .use-item {
    font-size: 0.82rem;
    padding: 3px 0;
    color: var(--ink);
    line-height: 1.4;
  }
  .use-item em {
    font-style: normal;
    font-family: 'Cinzel', serif;
    font-size: 0.7rem;
    color: var(--ink-light);
    background: rgba(184,134,11,0.1);
    padding: 1px 4px;
    border-radius: 2px;
    margin-right: 4px;
  }

  .tag-pill {
    display: inline-block;
    background: rgba(184,134,11,0.1);
    border: 1px solid rgba(184,134,11,0.3);
    border-radius: 2px;
    padding: 1px 6px;
    font-family: 'Cinzel', serif;
    font-size: 0.62rem;
    color: var(--ink);
    margin: 2px 2px 0 0;
  }

  .special-note {
    background: rgba(139,26,26,0.08);
    border-left: 3px solid var(--poison-red);
    padding: 5px 8px;
    font-size: 0.8rem;
    color: var(--poison-red);
    margin-top: 6px;
    border-radius: 0 2px 2px 0;
  }
  .sweet-note {
    background: rgba(26,90,139,0.08);
    border-left: 3px solid var(--sweet-blue);
    padding: 5px 8px;
    font-size: 0.8rem;
    color: var(--sweet-blue);
    margin-top: 6px;
    border-radius: 0 2px 2px 0;
  }
  .wand-note {
    background: rgba(74,26,74,0.08);
    border-left: 3px solid #4a1a4a;
    padding: 5px 8px;
    font-size: 0.8rem;
    color: #4a1a4a;
    margin-top: 6px;
    border-radius: 0 2px 2px 0;
  }

  /* COUNT CONTROL */
  .count-control {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 10px;
    padding-top: 8px;
    border-top: 1px solid rgba(184,134,11,0.2);
  }
  .count-label {
    font-family: 'Cinzel', serif;
    font-size: 0.7rem;
    color: var(--ink-light);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .count-btn {
    width: 26px;
    height: 26px;
    border: 1px solid var(--gold);
    background: var(--parchment-dark);
    color: var(--ink);
    border-radius: 3px;
    cursor: pointer;
    font-size: 1rem;
    line-height: 1;
    transition: background 0.15s;
    font-family: 'Cinzel', serif;
  }
  .count-btn:hover { background: var(--gold); color: white; }
  .count-display {
    font-family: 'Cinzel', serif;
    font-size: 1rem;
    color: var(--ink);
    min-width: 24px;
    text-align: center;
  }

  /* NO RESULTS */
  .no-results {
    grid-column: 1/-1;
    text-align: center;
    padding: 40px;
    color: var(--parchment-dark);
    font-style: italic;
    font-size: 1.1rem;
  }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 8px; }
  ::-webkit-scrollbar-track { background: #1a1208; }
  ::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 4px; }

  /* LOCALE SECTION HEADERS */
  .section-header {
    grid-column: 1/-1;
    font-family: 'Cinzel Decorative', cursive;
    font-size: 0.85rem;
    color: var(--gold-light);
    padding: 6px 0;
    border-bottom: 1px solid rgba(184,134,11,0.3);
    margin-top: 8px;
    letter-spacing: 2px;
    text-transform: uppercase;
  }
</style>
</head>
<body>

<div class="header">
  <div class="ornament">✦ ✦ ✦</div>
  <h1>Apothecaria — Diario de Reactivos</h1>
  <p>Registro del inventario de la bruja · High Rannoc</p>
  <div class="ornament">✦ ✦ ✦</div>
</div>

<div class="controls">
  <div class="search-box">
    <label>Buscar reactivo</label>
    <input type="text" id="searchInput" placeholder="Escribe un nombre o etiqueta...">
  </div>
  <div class="filter-group">
    <label>Tipo</label>
    <select id="typeFilter">
      <option value="">Todos los tipos</option>
      <option value="PLANT">🌿 Planta</option>
      <option value="ANIMAL">🦎 Animal</option>
      <option value="MAGIC">✨ Magia</option>
    </select>
  </div>
  <div class="filter-group">
    <label>Locale</label>
    <select id="localeFilter">
      <option value="">Todos los locales</option>
      <option value="Forest">🌲 Bosque</option>
      <option value="Loch">🌊 Lago</option>
      <option value="Mountain">⛰️ Montaña</option>
      <option value="Dungeon">💀 Mazmorra</option>
      <option value="Bog">🌿 Pantano</option>
      <option value="Isles">☁️ Islas</option>
      <option value="Strange">🌀 Lo Extraño</option>
      <option value="Village">🏘️ Aldea</option>
    </select>
  </div>
  <div class="filter-group">
    <label>Uso medicinal</label>
    <select id="useFilter">
      <option value="">Todos los usos</option>
      <option value="BLOOD">🩸 BLOOD</option>
      <option value="BONES">🦴 BONES</option>
      <option value="BOILS">💢 BOILS</option>
      <option value="BURN">🔥 BURN</option>
      <option value="COLD">❄️ COLD</option>
      <option value="COUGH">💨 COUGH</option>
      <option value="CURSE">🌀 CURSE</option>
      <option value="DEHYDRATION">💧 DEHYDRATION</option>
      <option value="EAR">👂 EAR</option>
      <option value="FEET">🦶 FEET</option>
      <option value="GHOUL">💀 GHOUL</option>
      <option value="HAIR">💇 HAIR</option>
      <option value="HOT">🌡️ HOT</option>
      <option value="INFECTION">🦠 INFECTION</option>
      <option value="LUNGS">🫁 LUNGS</option>
      <option value="MAGIC">✨ MAGIC</option>
      <option value="MOOD">😌 MOOD</option>
      <option value="MOUTH">👄 MOUTH</option>
      <option value="NERVES">⚡ NERVES</option>
      <option value="PAIN">😣 PAIN</option>
      <option value="PARASITE">🪱 PARASITE</option>
      <option value="POISON">☠️ POISON</option>
      <option value="RASH">🔴 RASH</option>
      <option value="SENSES">👁️ SENSES</option>
      <option value="SKIN">🩹 SKIN</option>
      <option value="SLEEP">😴 SLEEP</option>
      <option value="SPIRIT">👻 SPIRIT</option>
      <option value="STOMACH">🫃 STOMACH</option>
      <option value="TEETH">🦷 TEETH</option>
      <option value="TIME">⏳ TIME</option>
      <option value="WART">🟤 WART</option>
      <option value="WOUND">🩸 WOUND</option>
    </select>
  </div>
  <div class="filter-group">
    <label>Posesión</label>
    <select id="ownedFilter">
      <option value="">Todos</option>
      <option value="owned">✓ Tengo</option>
      <option value="missing">✗ Me falta</option>
    </select>
  </div>
</div>

<div class="stats-bar" id="statsBar">
  <div>Mostrando <span id="statShown">0</span> reactivos</div>
  <div>Tengo: <span id="statOwned">0</span></div>
  <div>Me faltan: <span id="statMissing">0</span></div>
  <div style="margin-left:auto;font-family:'Cinzel',serif;font-size:0.7rem"><span id="syncStatus" style="color:var(--gold)">⟳ Cargando...</span></div>
</div>

<div class="reagent-grid" id="reagentGrid"></div>

<script type="module">
// ══════════════════════════════════════════════════════
// DATOS DE REACTIVOS
// ══════════════════════════════════════════════════════

    locales: [
      { name: "Forest", value: 6 },
      { name: "Bog", value: 3 }
    ],
    seasonMods: "",

      { method: "RAW", tags: ["MOOD", "CURSE"] }
    ],
    notes: []
  },
  {
    id: 4,

    stars: 2,

      { name: "Forest", value: 10 },
      { name: "Mountain", value: 10 },
      { name: "Dungeon", value: 10 }

    uses: [
      { method: "BOIL", tags: ["BURN", "BOILS", "RASH"] }

  {
    id: 5,

    description: "Una planta hermosa que la gente de High Rannoc ha intentado tanto fomentar como erradicar. Crece donde puede obtener luz solar, fácil de encontrar en Verano.",
    locales: [
      { name: "Forest", value: 5 },
      { name: "Village", value: 4 }
    ],
    seasonMods: "-3 en Verano",
    uses: [
      { method: "CRUSH (semillas de escaramujo)", tags: ["BONES", "SKIN"] }
    ],
    notes: []
  },
  {
    id: 6,
    name: "Surgeon Sap",

// FIREBASE STATE SYNC
const firebaseConfig = {
  apiKey: "AIzaSyA1oY1ST7vRnKq_uSKwTkw71mo3hGR9FRE",
  authDomain: "apothecaria-reagents.firebaseapp.com",
  projectId: "apothecaria-reagents",
  storageBucket: "apothecaria-reagents.firebasestorage.app",
  messagingSenderId: "472429101242",
  appId: "1:472429101242:web:c672834a6b6f8b529cc283"
};

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const fbApp = initializeApp(firebaseConfig);
const db = getFirestore(fbApp);
const STATE_DOC = doc(db, "apothecaria", "state");

let state = {};
let syncReady = false;

function getState(id) {
  if (!state[id]) state[id] = { owned: false, count: 0 };
  return state[id];
}

let saveTimer = null;
function saveState() {
  localStorage.setItem('apothecaria_state', JSON.stringify(state));
  clearTimeout(saveTimer);
  saveTimer = setTimeout(async () => {
    try {
      await setDoc(STATE_DOC, { data: JSON.stringify(state) });
      setSyncStatus('ok');
    } catch(e) {
      setSyncStatus('offline');
    }
  }, 600);
}

function setSyncStatus(status) {
  const el = document.getElementById('syncStatus');
  if (!el) return;
  const msgs = { loading: '⟳ Cargando...', ok: '☁ Sincronizado', offline: '⚠ Sin conexion' };
  el.textContent = msgs[status] || '';
  el.style.color = status === 'ok' ? '#5a8b1a' : status === 'offline' ? '#8b1a1a' : '#b8860b';
}

async function initFirebase() {
  setSyncStatus('loading');
  const local = localStorage.getItem('apothecaria_state');
  if (local) { try { state = JSON.parse(local); } catch(e) {} }
  try {
    onSnapshot(STATE_DOC, (snap) => {
      if (snap.exists()) {
        try { state = JSON.parse(snap.data().data || '{}'); } catch(e) {}
        localStorage.setItem('apothecaria_state', JSON.stringify(state));
      }
      setSyncStatus('ok');
      if (!syncReady) { syncReady = true; }
      renderGrid();
    }, (err) => {
      setSyncStatus('offline');
      if (!syncReady) { syncReady = true; renderGrid(); }
    });
  } catch(e) {
    setSyncStatus('offline');
    syncReady = true;
    renderGrid();
  }
}

// RENDER
function renderStars(n) {
  if (n === 0) return '<span style="color:var(--ink-light);font-size:0.7rem">Sin nivel</span>';
  return '\u2605'.repeat(n) + '<span style="color:rgba(0,0,0,0.15)">\u2605</span>'.repeat(3 - n);
}

function renderDiffPips(value) {
  const max = 13;
  const filled = Math.min(value, max);
  let html = '<div class="diff-pips">';
  for (let i = 0; i < max; i++) {
    html += `<div class="pip${i < filled ? ' filled' : ''}"></div>`;
  }
  html += '</div>';
  return html;
}

function renderCard(r) {
  const s = getState(r.id);
  const owned = s.owned;
  const count = s.count || 0;

  const localeRows = r.locales.map(l =>
    `<tr>
      <td><span class="locale-badge loc-${l.name}">${l.name}</span></td>
      <td>
        <div class="difficulty-bar">
          ${renderDiffPips(l.value)}
          <span class="diff-num">${l.value}</span>
        </div>
      </td>
    </tr>`
  ).join('');

  const usesHtml = r.uses.filter(u => u.tags.length > 0).map(u =>
    `<div class="use-item">
      <em>${u.method}</em>
      ${u.tags.map(t => `<span class="tag-pill">${t}</span>`).join('')}
    </div>`
  ).join('');

  const notesHtml = r.notes.map(n => {
    if (n.includes('VENENO')) return `<div class="special-note">\u26a0 ${n}</div>`;
    if (n.includes('DULCE')) return `<div class="sweet-note">\u2756 ${n}</div>`;
    if (n.includes('Requiere Varita')) return `<div class="wand-note">\u2756 ${n}</div>`;
    return `<div class="special-note">${n}</div>`;
  }).join('');

  return `
  <div class="reagent-card${owned ? ' owned' : ''}" data-id="${r.id}" data-name="${r.name.toLowerCase()}" data-type="${r.type}" data-locales="${r.locales.map(l=>l.name).join(',')}" data-tags="${r.uses.flatMap(u=>u.tags).join(',')}">
    <div class="card-header" onclick="toggleCard(${r.id})">
      <div class="owned-checkbox" onclick="toggleOwned(event, ${r.id})" title="Marcar como obtenido">
        ${owned ? '\u2713' : ''}
      </div>
      <div class="card-main">
        <div class="reagent-name">${r.name}</div>
        <div class="card-meta">
          <span class="type-badge type-${r.type}">${r.type}</span>
          <span class="stars">${renderStars(r.stars)}</span>
        </div>
      </div>
      <span class="expand-icon">\u25b6</span>
    </div>
    <div class="card-body">
      <p class="card-description">${r.description}</p>
      <table class="locale-table">
        <thead><tr><th>Locale</th><th>Dificultad</th></tr></thead>
        <tbody>${localeRows}</tbody>
      </table>
      ${r.seasonMods ? `<div class="season-mod">\ud83d\udcc5 <span>Temporada:</span> ${r.seasonMods}</div>` : ''}
      ${usesHtml ? `<div class="uses-section"><div class="uses-title">Usos medicinales</div>${usesHtml}</div>` : ''}
      ${notesHtml}
      <div class="count-control">
        <span class="count-label">Cantidad:</span>
        <button class="count-btn" onclick="changeCount(event, ${r.id}, -1)">\u2212</button>
        <span class="count-display" id="count-${r.id}">${count}</span>
        <button class="count-btn" onclick="changeCount(event, ${r.id}, 1)">+</button>
      </div>
    </div>
  </div>`;
}

function toggleCard(id) {
  const card = document.querySelector(`[data-id="${id}"]`);
  card.classList.toggle('expanded');
}

function toggleOwned(event, id) {
  event.stopPropagation();
  const s = getState(id);
  s.owned = !s.owned;
  saveState();
  renderGrid();
}

function changeCount(event, id, delta) {
  event.stopPropagation();
  const s = getState(id);
  s.count = Math.max(0, (s.count || 0) + delta);
  saveState();
  document.getElementById(`count-${id}`).textContent = s.count;
}

function renderGrid() {
  const search = document.getElementById('searchInput').value.toLowerCase();
  const typeF = document.getElementById('typeFilter').value;
  const localeF = document.getElementById('localeFilter').value;
  const useF = document.getElementById('useFilter').value.toUpperCase();
  const ownedF = document.getElementById('ownedFilter').value;

  const filtered = reagents.filter(r => {
    const s = getState(r.id);
    if (search && !r.name.toLowerCase().includes(search) &&
        !r.uses.flatMap(u=>u.tags).join(' ').toLowerCase().includes(search) &&
        !r.description.toLowerCase().includes(search)) return false;
    if (typeF && r.type !== typeF) return false;
    if (localeF && !r.locales.some(l => l.name === localeF)) return false;
    if (useF && !r.uses.some(u => u.tags.some(t => t.toUpperCase() === useF))) return false;
    if (ownedF === 'owned' && !s.owned) return false;
    if (ownedF === 'missing' && s.owned) return false;
    return true;
  });

  const grid = document.getElementById('reagentGrid');
  if (filtered.length === 0) {
    grid.innerHTML = '<div class="no-results">No se encontraron reactivos con esos filtros...</div>';
  } else {
    grid.innerHTML = filtered.map(r => renderCard(r)).join('');
  }

  const ownedCount = reagents.filter(r => getState(r.id).owned).length;
  document.getElementById('statShown').textContent = filtered.length;
  document.getElementById('statOwned').textContent = ownedCount;
  document.getElementById('statMissing').textContent = reagents.length - ownedCount;
}

document.getElementById('searchInput').addEventListener('input', renderGrid);
document.getElementById('typeFilter').addEventListener('change', renderGrid);
document.getElementById('localeFilter').addEventListener('change', renderGrid);
document.getElementById('useFilter').addEventListener('change', renderGrid);
document.getElementById('ownedFilter').addEventListener('change', renderGrid);

// Exponer funciones al scope global para que funcionen los onclick
window.toggleCard = toggleCard;
window.toggleOwned = toggleOwned;
window.changeCount = changeCount;

initFirebase();
</script>
